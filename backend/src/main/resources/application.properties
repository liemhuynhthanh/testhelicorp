# =============================================
# Helicorp Backend — Application Configuration
# =============================================

# Server
server.port=8080

# =============================================
# MariaDB DataSource
# Thay đổi username/password cho phù hợp máy bạn
# =============================================
spring.datasource.url=jdbc:mariadb://localhost:3306/helicorp_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
# update = tự động cập nhật schema khi chạy (dùng cho dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# =============================================
# Jackson — JSON serialization
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
